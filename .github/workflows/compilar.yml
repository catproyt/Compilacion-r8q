name: Compilar MistOS S20 FE

on:
  workflow_dispatch:

jobs:
  compilar:
    runs-on: ubuntu-latest

    steps:
    - name: Maximizar Espacio en Disco (Limpieza Extrema)
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Configurar Entorno de Compilación
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configurar Git
      run: |
        git config --global user.name "catpro"
        git config --global user.email "catpro@github.com"

    - name: Inicializar Repositorio de MistOS (Android 16 QPR2)
      run: |
        mkdir -p ~/mistos
        cd ~/mistos
        repo init -u https://github.com/MistOS-Project/manifest.git -b 16 --depth=1

    - name: Sincronizar Código Fuente (Sync)
      run: |
        cd ~/mistos
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Descargar Trees del S20 FE
      run: |
        echo "Pronto pondremos los clones aquí"

    - name: Compilar la ROM
      run: |
        echo "Pronto iniciaremos el brunch/lunch aquí"
